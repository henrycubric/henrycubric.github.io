<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PONG — Henry Cubric</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --bg:     #0a0a0f;
    --panel:  #0f0f1a;
    --border: #1a1a3a;
    --cyan:   #00fff0;
    --yellow: #ffd700;
    --red:    #ff3131;
    --green:  #39ff14;
    --text:   #c8c8e0;
    --dim:    #4a4a6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* CRT scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 998;
  }

  h1 {
    font-size: clamp(1rem, 3vw, 1.6rem);
    letter-spacing: 0.4em;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan), 0 0 40px var(--cyan);
    margin-bottom: 1.2rem;
    animation: flicker 4s infinite;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
    98% { opacity: 0.5; }
    99% { opacity: 1; }
  }

  #canvas-wrap {
    position: relative;
    border: 2px solid var(--cyan);
    box-shadow: 0 0 20px var(--cyan), inset 0 0 30px rgba(0,255,240,0.04);
    background: #050508;
  }

  #pong {
    display: block;
    image-rendering: pixelated;
  }

  /* Overlay sits inside the canvas wrapper */
  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(5,5,8,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    z-index: 10;
  }

  #overlay h2 {
    font-size: clamp(0.7rem, 2.5vw, 1.1rem);
    letter-spacing: 0.3em;
    text-align: center;
  }

  #overlay .sub {
    font-size: 0.42rem;
    color: var(--text);
    letter-spacing: 0.15em;
    text-align: center;
    line-height: 2.2;
  }

  /* Difficulty buttons */
  .diff-group {
    display: flex;
    gap: 0.8rem;
  }

  .diff-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.42rem;
    letter-spacing: 0.15em;
    background: none;
    border: 1px solid var(--dim);
    color: var(--dim);
    padding: 0.5rem 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .diff-btn:hover,
  .diff-btn.selected {
    border-color: var(--cyan);
    color: var(--cyan);
    text-shadow: 0 0 8px var(--cyan);
    box-shadow: 0 0 10px rgba(0,255,240,0.3);
  }

  .start-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.2em;
    background: none;
    border: 1px solid var(--green);
    color: var(--green);
    padding: 0.6rem 1.4rem;
    cursor: pointer;
    text-shadow: 0 0 10px var(--green);
    box-shadow: 0 0 10px rgba(57,255,20,0.3);
    transition: all 0.2s;
    animation: pulse-btn 1.5s infinite;
  }

  .start-btn:hover {
    background: rgba(57,255,20,0.12);
    transform: scale(1.05);
  }

  @keyframes pulse-btn {
    0%, 100% { box-shadow: 0 0 10px rgba(57,255,20,0.3); }
    50%       { box-shadow: 0 0 24px rgba(57,255,20,0.7); }
  }

  #hint {
    margin-top: 0.8rem;
    font-size: 0.32rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-align: center;
    line-height: 2;
  }

  /* back link */
  #back {
    position: fixed;
    top: 1rem;
    left: 1rem;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.35rem;
    color: var(--dim);
    text-decoration: none;
    letter-spacing: 0.1em;
    transition: color 0.2s;
    z-index: 1000;
  }

  #back:hover { color: var(--cyan); }
</style>
</head>
<body>

<a id="back" href="games.html">← BACK</a>

<h1>PONG</h1>

<div id="canvas-wrap">
  <canvas id="pong" width="600" height="400"></canvas>

  <div id="overlay">
    <h2 id="ov-title" style="color: var(--cyan); text-shadow: 0 0 16px var(--cyan);">PONG</h2>
    <p class="sub" id="ov-sub">FIRST TO 7 WINS</p>
    <div class="diff-group" id="diff-group">
      <button class="diff-btn" data-diff="easy">EASY</button>
      <button class="diff-btn selected" data-diff="medium">MEDIUM</button>
      <button class="diff-btn" data-diff="hard">HARD</button>
    </div>
    <button class="start-btn" id="start-btn">START GAME</button>
  </div>
</div>

<div id="hint">
  W / S &nbsp;or&nbsp; MOUSE — MOVE PADDLE &nbsp;|&nbsp; TOUCH LEFT HALF &amp; DRAG
</div>

<script>
(() => {
  // ── Canvas ────────────────────────────────────────────
  const canvas = document.getElementById('pong');
  const ctx    = canvas.getContext('2d');
  const W = 600, H = 400;

  // ── Constants ─────────────────────────────────────────
  const PADDLE_W = 12, PADDLE_H = 80;
  const BALL_SIZE = 10;
  const PADDLE_MARGIN = 18;
  const WIN_SCORE = 7;
  const BALL_INIT_SPEED = 4.5;
  const BALL_SPEED_INC  = 0.22;   // per volley
  const BALL_MAX_SPEED  = 12;

  // AI speeds per difficulty (px per frame)
  const AI_BASE = { easy: 2.2, medium: 3.2, hard: 4.6 };
  // How much AI speed increases each time player scores
  const AI_ADAPT = { easy: 0.08, medium: 0.12, hard: 0.18 };

  // Colours
  const COL_PLAYER = '#00fff0';
  const COL_AI     = '#ff3131';
  const COL_BALL   = '#ffd700';
  const COL_BG     = '#050508';

  // ── State ─────────────────────────────────────────────
  let diff = 'medium';
  let aiSpeed, aiAdapt;
  let playerScore, aiScore;
  let player, ai, ball;
  let trail = [];        // [{x,y}]
  let running = false;
  let serving = false;   // brief pause before ball moves after score
  let serveTimer = 0;
  let animId = null;
  let lastTime = 0;
  let playerYTarget = H / 2;  // mouse/touch target
  let keysDown = {};
  let playerScoreAdaptAccum = 0;  // tracks player scores for AI adaptation

  // ── Difficulty selector ───────────────────────────────
  const diffBtns = document.querySelectorAll('.diff-btn');
  diffBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      diffBtns.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      diff = btn.dataset.diff;
    });
  });

  // ── Overlay helpers ───────────────────────────────────
  const overlay    = document.getElementById('overlay');
  const ovTitle    = document.getElementById('ov-title');
  const ovSub      = document.getElementById('ov-sub');
  const diffGroup  = document.getElementById('diff-group');
  const startBtn   = document.getElementById('start-btn');

  function showOverlay(title, titleColor, sub, btnLabel, showDiff) {
    ovTitle.textContent = title;
    ovTitle.style.color = titleColor;
    ovTitle.style.textShadow = `0 0 16px ${titleColor}`;
    ovSub.innerHTML = sub;
    startBtn.textContent = btnLabel;
    diffGroup.style.display = showDiff ? 'flex' : 'none';
    overlay.style.display = 'flex';
  }

  function hideOverlay() {
    overlay.style.display = 'none';
  }

  // ── Game init ─────────────────────────────────────────
  function initGame() {
    playerScore = 0;
    aiScore = 0;
    playerScoreAdaptAccum = 0;
    aiSpeed = AI_BASE[diff];
    aiAdapt = AI_ADAPT[diff];

    player = {
      x: PADDLE_MARGIN,
      y: H / 2 - PADDLE_H / 2,
      w: PADDLE_W,
      h: PADDLE_H
    };

    ai = {
      x: W - PADDLE_MARGIN - PADDLE_W,
      y: H / 2 - PADDLE_H / 2,
      w: PADDLE_W,
      h: PADDLE_H
    };

    playerYTarget = H / 2;
    resetBall(0);   // serve to center, random dir
    hideOverlay();
    running = true;
    serving = true;
    serveTimer = 90;  // ~1.5 s at 60fps
    trail = [];

    if (animId) cancelAnimationFrame(animId);
    lastTime = performance.now();
    animId = requestAnimationFrame(loop);
  }

  // ── Ball reset ────────────────────────────────────────
  function resetBall(scorerDir) {
    // scorerDir: -1 = player scored (ball goes right toward AI),
    //             1 = AI scored (ball goes left toward player),
    //             0 = start (random)
    ball = {
      x: W / 2 - BALL_SIZE / 2,
      y: H / 2 - BALL_SIZE / 2,
      speed: BALL_INIT_SPEED,
      vx: 0,
      vy: 0,
      pending: scorerDir   // direction stored for serve
    };
    trail = [];
    serving = true;
    serveTimer = 90;
  }

  function launchBall() {
    let dir = ball.pending;
    if (dir === 0) dir = Math.random() < 0.5 ? -1 : 1;
    const angle = (Math.random() * 0.5 - 0.25) * Math.PI;   // ±45° ish but biased center
    ball.vx = dir * ball.speed * Math.cos(angle);
    ball.vy = ball.speed * Math.sin(angle);
  }

  // ── Paddle clamping ───────────────────────────────────
  function clamp(val, lo, hi) { return Math.max(lo, Math.min(hi, val)); }

  function clampPaddle(p) {
    p.y = clamp(p.y, 0, H - PADDLE_H);
  }

  // ── Ball ↔ paddle collision ───────────────────────────
  function paddleCollide(p) {
    if (
      ball.x < p.x + p.w &&
      ball.x + BALL_SIZE > p.x &&
      ball.y < p.y + p.h &&
      ball.y + BALL_SIZE > p.y
    ) {
      // Reflect vx
      ball.vx = -ball.vx;

      // Angle based on hit position relative to paddle centre
      const hitY   = (ball.y + BALL_SIZE / 2) - (p.y + p.h / 2);
      const norm   = hitY / (p.h / 2);            // -1 .. +1
      const maxAngle = Math.PI * 0.38;             // 68°
      const angle  = norm * maxAngle;

      // Keep direction of vx, recalculate vy
      const speed  = Math.min(ball.speed + BALL_SPEED_INC, BALL_MAX_SPEED);
      ball.speed   = speed;
      const dir    = ball.vx > 0 ? 1 : -1;
      ball.vx = dir * speed * Math.cos(angle);
      ball.vy = speed * Math.sin(angle);

      // Push ball out of paddle to prevent sticking
      if (dir > 0) {
        ball.x = p.x + p.w;
      } else {
        ball.x = p.x - BALL_SIZE;
      }
      return true;
    }
    return false;
  }

  // ── Update ────────────────────────────────────────────
  function update() {
    if (serving) {
      serveTimer--;
      if (serveTimer <= 0) {
        serving = false;
        launchBall();
      }
      // still allow paddle movement during serve pause
      movePlayer();
      moveAI();
      return;
    }

    // Trail
    trail.push({ x: ball.x, y: ball.y });
    if (trail.length > 5) trail.shift();

    // Move ball
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Wall bounce (top/bottom)
    if (ball.y <= 0) {
      ball.y = 0;
      ball.vy = Math.abs(ball.vy);
    }
    if (ball.y + BALL_SIZE >= H) {
      ball.y = H - BALL_SIZE;
      ball.vy = -Math.abs(ball.vy);
    }

    // Paddle collisions
    paddleCollide(player);
    paddleCollide(ai);

    // Score
    if (ball.x + BALL_SIZE < 0) {
      // AI scores
      aiScore++;
      if (aiScore >= WIN_SCORE) { endGame(false); return; }
      resetBall(1);   // serve toward player (who just let it through)
    }
    if (ball.x > W) {
      // Player scores
      playerScore++;
      playerScoreAdaptAccum++;
      // Adaptive difficulty: bump AI speed
      aiSpeed = Math.min(aiSpeed + aiAdapt, 9);
      if (playerScore >= WIN_SCORE) { endGame(true); return; }
      resetBall(-1);  // serve toward AI (who just let it through)
    }

    movePlayer();
    moveAI();
  }

  function movePlayer() {
    // Keyboard
    if (keysDown['KeyW'] || keysDown['ArrowUp'])   player.y -= 5;
    if (keysDown['KeyS'] || keysDown['ArrowDown']) player.y += 5;

    // Mouse/touch: ease toward target
    const dy = playerYTarget - (player.y + PADDLE_H / 2);
    player.y += dy * 0.18;

    clampPaddle(player);
  }

  function moveAI() {
    const targetY = ball.y + BALL_SIZE / 2 - PADDLE_H / 2;
    const dy = targetY - ai.y;
    const move = clamp(dy, -aiSpeed, aiSpeed);
    ai.y += move;
    clampPaddle(ai);
  }

  // ── Game end ──────────────────────────────────────────
  function endGame(playerWon) {
    running = false;
    cancelAnimationFrame(animId);
    render();   // draw final state

    if (playerWon) {
      showOverlay(
        'YOU WIN!',
        '#ffd700',
        `SCORE  ${playerScore} — ${aiScore}<br>WELL PLAYED`,
        'PLAY AGAIN',
        true
      );
    } else {
      showOverlay(
        'GAME OVER',
        '#ff3131',
        `SCORE  ${playerScore} — ${aiScore}<br>BETTER LUCK NEXT TIME`,
        'TRY AGAIN',
        true
      );
    }
  }

  // ── Main loop ─────────────────────────────────────────
  function loop(ts) {
    if (!running) return;
    update();
    render();
    animId = requestAnimationFrame(loop);
  }

  // ── Render ────────────────────────────────────────────
  function glowRect(x, y, w, h, color, blur) {
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur  = blur;
    ctx.fillStyle   = color;
    ctx.fillRect(x, y, w, h);
    // Second pass for stronger glow
    ctx.fillRect(x, y, w, h);
    ctx.restore();
  }

  function render() {
    // Background
    ctx.fillStyle = COL_BG;
    ctx.fillRect(0, 0, W, H);

    // Dashed center line
    ctx.save();
    ctx.setLineDash([12, 10]);
    ctx.strokeStyle = 'rgba(200,200,224,0.15)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W / 2, 0);
    ctx.lineTo(W / 2, H);
    ctx.stroke();
    ctx.restore();

    // Scores
    ctx.save();
    ctx.font = '20px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    ctx.fillStyle = COL_PLAYER;
    ctx.shadowColor = COL_PLAYER;
    ctx.shadowBlur = 12;
    ctx.fillText(playerScore ?? 0, W / 2 - 70, 14);

    ctx.fillStyle = COL_AI;
    ctx.shadowColor = COL_AI;
    ctx.shadowBlur = 12;
    ctx.fillText(aiScore ?? 0, W / 2 + 70, 14);

    ctx.restore();

    // Ball trail
    for (let i = 0; i < trail.length; i++) {
      const alpha = (i + 1) / (trail.length + 1) * 0.45;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = COL_BALL;
      ctx.shadowColor = COL_BALL;
      ctx.shadowBlur = 6;
      ctx.fillRect(trail[i].x, trail[i].y, BALL_SIZE, BALL_SIZE);
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // Ball
    if (!serving || Math.floor(serveTimer / 8) % 2 === 0) {
      glowRect(ball.x, ball.y, BALL_SIZE, BALL_SIZE, COL_BALL, 18);
    }

    // Player paddle (cyan)
    glowRect(player.x, player.y, PADDLE_W, PADDLE_H, COL_PLAYER, 20);

    // AI paddle (red)
    glowRect(ai.x, ai.y, PADDLE_W, PADDLE_H, COL_AI, 20);

    // Serve countdown dots
    if (serving && running) {
      const dots = Math.ceil(serveTimer / 30);
      ctx.save();
      ctx.fillStyle = 'rgba(200,200,224,0.5)';
      ctx.font = '8px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const dotStr = '• '.repeat(dots).trim();
      ctx.fillText(dotStr, W / 2, H / 2 + 28);
      ctx.restore();
    }
  }

  // ── Input: keyboard ───────────────────────────────────
  document.addEventListener('keydown', e => {
    keysDown[e.code] = true;
    if (['KeyW','KeyS','ArrowUp','ArrowDown','Space'].includes(e.code)) {
      e.preventDefault();
    }
  });

  document.addEventListener('keyup', e => {
    keysDown[e.code] = false;
  });

  // ── Input: mouse ──────────────────────────────────────
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const scaleY = H / rect.height;
    playerYTarget = (e.clientY - rect.top) * scaleY;
  });

  // ── Input: touch ──────────────────────────────────────
  let touchActive = false;
  canvas.addEventListener('touchstart', e => {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    const tx = (t.clientX - rect.left) * (W / rect.width);
    if (tx < W / 2) {
      touchActive = true;
      const ty = (t.clientY - rect.top) * (H / rect.height);
      playerYTarget = ty;
      e.preventDefault();
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    if (!touchActive) return;
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    const tx = (t.clientX - rect.left) * (W / rect.width);
    if (tx < W / 2) {
      const ty = (t.clientY - rect.top) * (H / rect.height);
      playerYTarget = ty;
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    touchActive = false;
  });

  // ── Start button ──────────────────────────────────────
  startBtn.addEventListener('click', () => {
    initGame();
  });

  // ── Initial render (static title screen) ─────────────
  (function initialRender() {
    ctx.fillStyle = COL_BG;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.setLineDash([12, 10]);
    ctx.strokeStyle = 'rgba(200,200,224,0.12)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W / 2, 0);
    ctx.lineTo(W / 2, H);
    ctx.stroke();
    ctx.restore();

    // Static paddles
    glowRect(PADDLE_MARGIN, H / 2 - PADDLE_H / 2, PADDLE_W, PADDLE_H, COL_PLAYER, 20);
    glowRect(W - PADDLE_MARGIN - PADDLE_W, H / 2 - PADDLE_H / 2, PADDLE_W, PADDLE_H, COL_AI, 20);
  })();

})();
</script>
</body>
</html>
