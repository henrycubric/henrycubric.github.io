<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPACE INVADERS — Henry Cubric</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --bg:     #0a0a0f;
    --panel:  #0f0f1a;
    --border: #1a1a3a;
    --cyan:   #00fff0;
    --yellow: #ffd700;
    --purple: #bf5fff;
    --green:  #39ff14;
    --red:    #ff3131;
    --text:   #c8c8e0;
    --dim:    #4a4a6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* CRT scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 998;
  }

  h1 {
    font-size: clamp(0.8rem, 2.5vw, 1.4rem);
    letter-spacing: 0.4em;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan), 0 0 40px var(--cyan);
    margin-bottom: 1.2rem;
    animation: flicker 4s infinite;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
    98% { opacity: 0.5; }
    99% { opacity: 1; }
  }

  #board-wrap {
    position: relative;
    border: 2px solid var(--cyan);
    box-shadow: 0 0 20px var(--cyan), inset 0 0 30px rgba(0,255,240,0.04);
    background: #050508;
  }

  #board {
    display: block;
    image-rendering: pixelated;
  }

  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(5,5,8,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.4rem;
    z-index: 10;
  }

  #overlay h2 {
    font-size: clamp(0.6rem, 2vw, 1rem);
    letter-spacing: 0.3em;
    color: var(--yellow);
    text-shadow: 0 0 20px var(--yellow);
    text-align: center;
  }

  #overlay p {
    font-size: 0.42rem;
    color: var(--text);
    letter-spacing: 0.1em;
    text-align: center;
    line-height: 2.2;
  }

  #overlay .start-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.2em;
    background: none;
    border: 1px solid var(--green);
    color: var(--green);
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    text-shadow: 0 0 10px var(--green);
    box-shadow: 0 0 10px rgba(57,255,20,0.3);
    transition: all 0.2s;
    animation: pulse-btn 1.5s infinite;
  }

  #overlay .start-btn:hover {
    background: rgba(57,255,20,0.15);
    transform: scale(1.05);
  }

  @keyframes pulse-btn {
    0%, 100% { box-shadow: 0 0 10px rgba(57,255,20,0.3); }
    50%       { box-shadow: 0 0 22px rgba(57,255,20,0.7); }
  }

  #back {
    position: fixed;
    top: 1rem;
    left: 1rem;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.35rem;
    color: var(--dim);
    text-decoration: none;
    letter-spacing: 0.1em;
    transition: color 0.2s;
    z-index: 1000;
  }
  #back:hover { color: var(--cyan); }
</style>
</head>
<body>

<a id="back" href="games.html">← BACK</a>

<h1>SPACE INVADERS</h1>

<div id="board-wrap">
  <canvas id="board" width="480" height="560"></canvas>
  <div id="overlay">
    <h2 id="overlay-title">SPACE INVADERS</h2>
    <p id="overlay-msg">
      ARROW KEYS / WASD TO MOVE<br>
      SPACE TO SHOOT<br>
      DESTROY ALL ALIENS<br>
      DON'T LET THEM LAND!
    </p>
    <button class="start-btn" id="start-btn">INSERT COIN</button>
  </div>
</div>

<script>
(() => {
  'use strict';

  // ── Canvas setup ───────────────────────────────────────────────────────────
  const canvas = document.getElementById('board');
  const ctx    = canvas.getContext('2d');
  const W = 480, H = 560;

  // ── Colors ─────────────────────────────────────────────────────────────────
  const C = {
    bg:     '#050508',
    cyan:   '#00fff0',
    green:  '#39ff14',
    yellow: '#ffd700',
    red:    '#ff3131',
    purple: '#bf5fff',
    dim:    '#4a4a6a',
    text:   '#c8c8e0',
  };

  // ── Layout ─────────────────────────────────────────────────────────────────
  const HUD_H      = 46;              // top HUD height px
  const PLAY_TOP   = HUD_H;
  const PLAYER_W   = 32;
  const PLAYER_H   = 16;
  const PLAYER_Y   = H - 52 - PLAYER_H; // vertical position of player top
  const PLAYER_SPD = 3.0;

  // Alien grid
  const A_COLS     = 11;
  const A_ROWS     = 5;
  const A_CELL_W   = 36;
  const A_CELL_H   = 30;
  const A_ORIG_X   = 14;            // initial gridX (left of col 0)
  const A_ORIG_Y   = PLAY_TOP + 22; // initial gridY (top of row 0)

  // Shields
  const SH_COUNT  = 4;
  const SH_W      = 48;
  const SH_H      = 28;
  const SH_PIX    = 4;                        // pixel block size
  const SH_PCOLS  = Math.floor(SH_W / SH_PIX);
  const SH_PROWS  = Math.floor(SH_H / SH_PIX);
  const SH_Y      = PLAYER_Y - SH_H - 18;    // shield strip top

  // UFO
  const UFO_Y  = PLAY_TOP + 6;
  const UFO_W  = 44;
  const UFO_H  = 16;
  const UFO_SPD = 1.5;

  // Bullets
  const PB_SPD  = 7;   // player bullet speed
  const AB_BASE = 2.0; // alien bullet base speed

  // ── Stars (deterministic) ──────────────────────────────────────────────────
  const STARS = (() => {
    const s = []; let seed = 12345;
    const rand = () => { seed = (seed * 1664525 + 1013904223) & 0x7fffffff; return seed / 0x7fffffff; };
    for (let i = 0; i < 70; i++) {
      s.push({ x: rand() * W, y: PLAY_TOP + rand() * (SH_Y - PLAY_TOP), br: 0.15 + rand() * 0.55 });
    }
    return s;
  })();

  // ── Game state ────────────────────────────────────────────────────────────
  let running    = false;
  let animId     = null;
  let lastTs     = 0;

  let score, hiScore, wave, lives;
  let playerX;            // center of player cannon
  let playerBullet;       // null | {x,y}
  let aliens;             // flat array of {row,col,alive,frame}
  let gridX, gridY;       // left/top of alien grid
  let gridDir;            // +1 = right, -1 = left
  let alienCount;
  let aFrameTimer;        // ms until next alien animation frame flip
  let aMoveTimer;         // ms until next grid step
  let aMoveInterval;      // current interval between grid steps
  let aShootTimer;
  let aShootInterval;
  let alienBullets;       // [{x,y}]
  let shields;            // [{x,y,grid:Uint8Array}]
  let ufo;                // null | {x,dir,pts}
  let ufoTimer;
  let ufoInterval;
  let explosions;         // [{x,y,t,color,label?}]
  let alienFrame;         // global 0/1

  hiScore = parseInt(localStorage.getItem('invaders-hi') || '0');

  // ── Shield construction ────────────────────────────────────────────────────
  function makeShieldGrid() {
    const g = new Uint8Array(SH_PCOLS * SH_PROWS);
    for (let r = 0; r < SH_PROWS; r++) {
      for (let c = 0; c < SH_PCOLS; c++) {
        const fromBot  = SH_PROWS - 1 - r;
        const fromL    = c;
        const fromR    = SH_PCOLS - 1 - c;
        // hollow out bottom-left and bottom-right notches (2x3 area)
        const notch = fromBot < 3 && (fromL < 2 || fromR < 2);
        g[r * SH_PCOLS + c] = notch ? 0 : 1;
      }
    }
    return g;
  }

  function initShields() {
    shields = [];
    const gap = (W - SH_COUNT * SH_W) / (SH_COUNT + 1);
    for (let i = 0; i < SH_COUNT; i++) {
      shields.push({ x: Math.round(gap + i * (SH_W + gap)), y: SH_Y, grid: makeShieldGrid() });
    }
  }

  // ── Alien grid init ────────────────────────────────────────────────────────
  function initAliens() {
    aliens = [];
    alienCount = A_COLS * A_ROWS;
    for (let r = 0; r < A_ROWS; r++) {
      for (let c = 0; c < A_COLS; c++) {
        aliens.push({ row: r, col: c, alive: true, frame: 0 });
      }
    }
    gridX = A_ORIG_X;
    gridY = A_ORIG_Y;
    gridDir = 1;
  }

  // ── Helpers: alien position ────────────────────────────────────────────────
  function aX(col) { return gridX + col * A_CELL_W + A_CELL_W / 2; }
  function aY(row) { return gridY + row * A_CELL_H + A_CELL_H / 2; }

  function alienColor(row) {
    if (row === 0)       return C.cyan;
    if (row <= 2)        return C.purple;
    return C.green;
  }

  function alienPts(row) {
    if (row === 0)  return 10;
    if (row <= 2)   return 20;
    return 30;
  }

  // ── Interval calculation ───────────────────────────────────────────────────
  function recalcIntervals() {
    const ratio = alienCount / (A_COLS * A_ROWS);
    aMoveInterval  = Math.max(60,  Math.floor(700 * ratio / wave));
    aShootInterval = Math.max(350, Math.floor(1100 / wave));
  }

  // ── Start / wave ──────────────────────────────────────────────────────────
  function startGame() {
    score        = 0;
    lives        = 3;
    wave         = 1;
    playerX      = W / 2;
    playerBullet = null;
    alienBullets = [];
    explosions   = [];
    ufo          = null;
    alienFrame   = 0;
    aFrameTimer  = 0;
    aMoveTimer   = 0;
    aShootTimer  = 0;
    ufoTimer     = 0;
    ufoInterval  = randomUfoInterval();
    initAliens();
    initShields();
    recalcIntervals();
    hideOverlay();
    running  = true;
    lastTs   = 0;
    if (animId) cancelAnimationFrame(animId);
    animId = requestAnimationFrame(loop);
  }

  function startNextWave() {
    wave++;
    playerBullet = null;
    alienBullets = [];
    ufo          = null;
    alienFrame   = 0;
    aFrameTimer  = 0;
    aMoveTimer   = 0;
    aShootTimer  = 0;
    ufoTimer     = 0;
    ufoInterval  = randomUfoInterval();
    initAliens();
    recalcIntervals();
  }

  function randomUfoInterval() { return 14000 + Math.random() * 12000; }

  // ── Main loop ──────────────────────────────────────────────────────────────
  function loop(ts) {
    if (!running) return;
    const dt = lastTs ? Math.min(ts - lastTs, 50) : 16;
    lastTs = ts;
    processInput(dt);
    update(dt);
    render();
    animId = requestAnimationFrame(loop);
  }

  // ── Input processing (called every frame) ─────────────────────────────────
  function processInput(dt) {
    const spd = PLAYER_SPD;
    if (keys.left)  playerX = Math.max(PLAYER_W / 2,     playerX - spd);
    if (keys.right) playerX = Math.min(W - PLAYER_W / 2, playerX + spd);
    if (keys.shootPressed) {
      keys.shootPressed = false;
      firePlayer();
    }
  }

  function firePlayer() {
    if (!playerBullet) {
      playerBullet = { x: playerX, y: PLAYER_Y };
    }
  }

  // ── Update ────────────────────────────────────────────────────────────────
  function update(dt) {
    // alien frame animation
    aFrameTimer += dt;
    if (aFrameTimer >= 500) {
      aFrameTimer -= 500;
      alienFrame = 1 - alienFrame;
      for (const a of aliens) { if (a.alive) a.frame = alienFrame; }
    }

    // alien grid move
    aMoveTimer += dt;
    if (aMoveTimer >= aMoveInterval) {
      aMoveTimer -= aMoveInterval;
      moveGrid();
    }

    // alien shoot
    aShootTimer += dt;
    if (aShootTimer >= aShootInterval) {
      aShootTimer -= aShootInterval;
      tryAlienShoot();
    }

    // UFO timer
    ufoTimer += dt;
    if (!ufo && ufoTimer >= ufoInterval) {
      spawnUfo();
      ufoTimer    = 0;
      ufoInterval = randomUfoInterval();
    }
    if (ufo) {
      ufo.x += ufo.dir * UFO_SPD;
      if (ufo.x < -UFO_W - 4 || ufo.x > W + UFO_W + 4) ufo = null;
    }

    // player bullet
    if (playerBullet) {
      playerBullet.y -= PB_SPD;
      if (playerBullet.y < PLAY_TOP) {
        playerBullet = null;
      } else {
        checkPlayerBullet();
      }
    }

    // alien bullets
    const abSpd = AB_BASE * (1 + (wave - 1) * 0.15);
    for (let i = alienBullets.length - 1; i >= 0; i--) {
      const b = alienBullets[i];
      b.y += abSpd;
      if (b.y > H + 8) { alienBullets.splice(i, 1); continue; }
      // hit player?
      if (b.y >= PLAYER_Y && b.y <= PLAYER_Y + PLAYER_H &&
          Math.abs(b.x - playerX) < PLAYER_W / 2 - 2) {
        alienBullets.splice(i, 1);
        onPlayerHit();
        continue;
      }
      // hit shield?
      if (hurtShield(b.x, b.y)) { alienBullets.splice(i, 1); continue; }
    }

    // explosion decay
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].t -= dt;
      if (explosions[i].t <= 0) explosions.splice(i, 1);
    }

    // aliens reached player line?
    for (const a of aliens) {
      if (a.alive && aY(a.row) + A_CELL_H / 2 >= PLAYER_Y) {
        gameOver(); return;
      }
    }

    // wave cleared?
    if (alienCount === 0) startNextWave();
  }

  // ── Alien grid movement ────────────────────────────────────────────────────
  function moveGrid() {
    // Find live column bounds
    let minCol = A_COLS, maxCol = -1;
    for (const a of aliens) {
      if (!a.alive) continue;
      if (a.col < minCol) minCol = a.col;
      if (a.col > maxCol) maxCol = a.col;
    }
    if (maxCol < 0) return;

    const leftEdge  = gridX + minCol * A_CELL_W;
    const rightEdge = gridX + maxCol * A_CELL_W + A_CELL_W;
    const wallL = 6, wallR = W - 6;

    if (gridDir === 1 && rightEdge + A_CELL_W * 0.35 > wallR) {
      gridY  += 8;
      gridDir = -1;
    } else if (gridDir === -1 && leftEdge - A_CELL_W * 0.35 < wallL) {
      gridY  += 8;
      gridDir = 1;
    } else {
      gridX += A_CELL_W * 0.35 * gridDir;
    }
    recalcIntervals();
  }

  // ── Alien shooting ─────────────────────────────────────────────────────────
  function tryAlienShoot() {
    if (alienBullets.length >= 3) return;
    // pick a random column's bottom-most alive alien
    const cols = [];
    for (let c = 0; c < A_COLS; c++) {
      for (let r = A_ROWS - 1; r >= 0; r--) {
        const a = aliens[r * A_COLS + c];
        if (a && a.alive) { cols.push(a); break; }
      }
    }
    if (!cols.length) return;
    const shooter = cols[Math.floor(Math.random() * cols.length)];
    alienBullets.push({ x: aX(shooter.col), y: aY(shooter.row) + A_CELL_H / 2 - 2 });
  }

  // ── UFO ───────────────────────────────────────────────────────────────────
  function spawnUfo() {
    const dir = Math.random() < 0.5 ? 1 : -1;
    const ptsList = [50, 100, 150, 200, 300];
    ufo = { x: dir === 1 ? -UFO_W / 2 - 4 : W + UFO_W / 2 + 4, dir, pts: ptsList[Math.floor(Math.random() * ptsList.length)] };
  }

  // ── Player bullet collisions ──────────────────────────────────────────────
  function checkPlayerBullet() {
    const bx = playerBullet.x, by = playerBullet.y;

    // UFO hit
    if (ufo) {
      const uy = UFO_Y + UFO_H / 2;
      if (Math.abs(bx - ufo.x) < UFO_W / 2 && Math.abs(by - uy) < UFO_H / 2) {
        addScore(ufo.pts);
        explosions.push({ x: ufo.x, y: uy, t: 700, color: C.red, label: ufo.pts });
        ufo = null;
        playerBullet = null;
        return;
      }
    }

    // Alien hit
    for (const a of aliens) {
      if (!a.alive) continue;
      const ax = aX(a.col), ay = aY(a.row);
      if (Math.abs(bx - ax) < A_CELL_W / 2 - 2 && Math.abs(by - ay) < A_CELL_H / 2 - 2) {
        a.alive = false;
        alienCount--;
        addScore(alienPts(a.row));
        explosions.push({ x: ax, y: ay, t: 500, color: alienColor(a.row) });
        playerBullet = null;
        recalcIntervals();
        return;
      }
    }

    // Shield hit
    if (hurtShield(bx, by)) { playerBullet = null; }
  }

  // ── Shield damage ─────────────────────────────────────────────────────────
  function hurtShield(bx, by) {
    for (const s of shields) {
      if (bx < s.x || bx > s.x + SH_W || by < s.y || by > s.y + SH_H) continue;
      const pc = Math.floor((bx - s.x) / SH_PIX);
      const pr = Math.floor((by - s.y) / SH_PIX);
      if (pc < 0 || pc >= SH_PCOLS || pr < 0 || pr >= SH_PROWS) continue;
      if (!s.grid[pr * SH_PCOLS + pc]) continue;
      // crater: remove 3×3 block
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const nr = pr + dr, nc = pc + dc;
          if (nr >= 0 && nr < SH_PROWS && nc >= 0 && nc < SH_PCOLS) {
            s.grid[nr * SH_PCOLS + nc] = 0;
          }
        }
      }
      return true;
    }
    return false;
  }

  // ── Player hit / game over ────────────────────────────────────────────────
  function onPlayerHit() {
    explosions.push({ x: playerX, y: PLAYER_Y + PLAYER_H / 2, t: 800, color: C.red });
    lives--;
    playerBullet = null;
    alienBullets = [];
    if (lives <= 0) gameOver();
  }

  function gameOver() {
    running = false;
    showOverlay('GAME OVER', `SCORE: ${score}<br>HIGH SCORE: ${hiScore}<br>WAVE: ${wave}`, 'PLAY AGAIN');
  }

  function addScore(pts) {
    score += pts;
    if (score > hiScore) {
      hiScore = score;
      localStorage.setItem('invaders-hi', hiScore);
    }
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, W, H);

    drawStars();
    drawHUD();

    // HUD divider
    ctx.strokeStyle = C.dim;
    ctx.lineWidth = 1;
    ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.moveTo(0, HUD_H - 1); ctx.lineTo(W, HUD_H - 1); ctx.stroke();

    // Ground line
    setGlow(C.green, 6);
    ctx.strokeStyle = C.green;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, PLAYER_Y + PLAYER_H + 5);
    ctx.lineTo(W, PLAYER_Y + PLAYER_H + 5);
    ctx.stroke();
    clearGlow();

    drawShields();
    drawAliens();
    if (ufo) drawUfo();
    drawPlayer();
    drawBullets();
    drawExplosions();
    drawLivesStrip();
  }

  // ── Stars ─────────────────────────────────────────────────────────────────
  function drawStars() {
    for (const s of STARS) {
      ctx.globalAlpha = s.br;
      ctx.fillStyle   = '#ffffff';
      ctx.fillRect(s.x, s.y, 1, 1);
    }
    ctx.globalAlpha = 1;
  }

  // ── HUD ───────────────────────────────────────────────────────────────────
  function drawHUD() {
    ctx.font = '7px "Press Start 2P"';
    ctx.textBaseline = 'middle';

    // Score (left)
    setGlow(C.dim, 0); ctx.fillStyle = C.dim;
    ctx.fillText('SCORE', 8, 13);
    setGlow(C.cyan, 10); ctx.fillStyle = C.cyan;
    ctx.fillText(pad6(score), 8, 30);

    // Hi-score (centre)
    const hiLabel = 'HI-SCORE';
    const hiLW = ctx.measureText(hiLabel).width;
    setGlow(C.dim, 0); ctx.fillStyle = C.dim;
    ctx.fillText(hiLabel, W / 2 - hiLW / 2, 13);
    const hiStr = pad6(hiScore);
    const hiSW  = ctx.measureText(hiStr).width;
    setGlow(C.yellow, 10); ctx.fillStyle = C.yellow;
    ctx.fillText(hiStr, W / 2 - hiSW / 2, 30);

    // Wave (right)
    const waveStr = 'WAVE ' + String(wave).padStart(2, '0');
    const waveW   = ctx.measureText(waveStr).width;
    setGlow(C.purple, 10); ctx.fillStyle = C.purple;
    ctx.fillText(waveStr, W - waveW - 8, 22);

    clearGlow();
  }

  function pad6(n) { return String(n).padStart(6, '0'); }

  // ── Draw aliens ───────────────────────────────────────────────────────────
  function drawAliens() {
    for (const a of aliens) {
      if (!a.alive) continue;
      const x  = aX(a.col);
      const y  = aY(a.row);
      const cl = alienColor(a.row);
      setGlow(cl, 10);
      ctx.fillStyle = cl;
      if (a.row === 0)       drawUfoAlien(x, y, a.frame);
      else if (a.row <= 2)   drawCrabAlien(x, y, a.frame);
      else                   drawSquidAlien(x, y, a.frame);
      clearGlow();
    }
  }

  // Row 0: UFO-type — round saucer with antennae
  function drawUfoAlien(cx, cy, frame) {
    // Body ellipse
    ctx.beginPath();
    ctx.ellipse(cx, cy + 2, 10, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    // Dome
    ctx.beginPath();
    ctx.ellipse(cx, cy - 2, 6, 5, 0, Math.PI, 0);
    ctx.fill();
    // Antennae (animate up/down)
    const aOff = frame === 0 ? 0 : 2;
    ctx.fillRect(cx - 9,  cy - 8 - aOff, 2, 4 + aOff);
    ctx.fillRect(cx + 7,  cy - 8 - aOff, 2, 4 + aOff);
    // Antenna tips
    ctx.fillRect(cx - 11, cy - 8 - aOff, 6, 2);
    ctx.fillRect(cx + 5,  cy - 8 - aOff, 6, 2);
    // Eye voids
    const es = ctx.fillStyle;
    ctx.fillStyle = C.bg;
    ctx.fillRect(cx - 5, cy,    3, 3);
    ctx.fillRect(cx + 2, cy,    3, 3);
    ctx.fillStyle = es;
    // Bottom legs
    ctx.fillRect(cx - 11, cy + 6, 3, 3);
    ctx.fillRect(cx - 5,  cy + 7, 2, 3);
    ctx.fillRect(cx + 3,  cy + 7, 2, 3);
    ctx.fillRect(cx + 8,  cy + 6, 3, 3);
  }

  // Rows 1-2: Crab-type — wide body with claws
  function drawCrabAlien(cx, cy, frame) {
    // Main body
    ctx.fillRect(cx - 9, cy - 5, 18, 11);
    // Top antennae
    ctx.fillRect(cx - 11, cy - 10, 4,  6);
    ctx.fillRect(cx + 7,  cy - 10, 4,  6);
    ctx.fillRect(cx - 13, cy - 10, 2,  2); // tips
    ctx.fillRect(cx + 11, cy - 10, 2,  2);
    // Eye voids
    const es = ctx.fillStyle;
    ctx.fillStyle = C.bg;
    ctx.fillRect(cx - 7, cy - 3, 4, 4);
    ctx.fillRect(cx + 3,  cy - 3, 4, 4);
    ctx.fillStyle = es;
    // Claws animate
    if (frame === 0) {
      ctx.fillRect(cx - 14, cy - 2, 5, 4);
      ctx.fillRect(cx - 14, cy + 2, 4, 3);
      ctx.fillRect(cx + 9,  cy - 2, 5, 4);
      ctx.fillRect(cx + 10, cy + 2, 4, 3);
      ctx.fillRect(cx - 5,  cy + 6, 3, 4);
      ctx.fillRect(cx + 2,  cy + 6, 3, 4);
    } else {
      ctx.fillRect(cx - 15, cy - 3, 5, 5);
      ctx.fillRect(cx - 15, cy + 2, 5, 3);
      ctx.fillRect(cx + 10, cy - 3, 5, 5);
      ctx.fillRect(cx + 10, cy + 2, 5, 3);
      ctx.fillRect(cx - 6,  cy + 7, 3, 4);
      ctx.fillRect(cx + 3,  cy + 7, 3, 4);
    }
  }

  // Rows 3-4: Squid-type — round head, tentacles
  function drawSquidAlien(cx, cy, frame) {
    // Rounded head
    ctx.beginPath();
    ctx.arc(cx, cy - 4, 8, Math.PI, 0);
    ctx.fill();
    // Body
    ctx.fillRect(cx - 8, cy - 4, 16, 9);
    // Eye voids
    const es = ctx.fillStyle;
    ctx.fillStyle = C.bg;
    ctx.fillRect(cx - 6, cy - 6, 4, 4);
    ctx.fillRect(cx + 2,  cy - 6, 4, 4);
    ctx.fillStyle = es;
    // Tentacles animate
    if (frame === 0) {
      ctx.fillRect(cx - 9,  cy + 5, 3, 5);
      ctx.fillRect(cx - 4,  cy + 5, 3, 4);
      ctx.fillRect(cx + 1,  cy + 5, 3, 4);
      ctx.fillRect(cx + 6,  cy + 5, 3, 5);
    } else {
      ctx.fillRect(cx - 10, cy + 6, 3, 4);
      ctx.fillRect(cx - 4,  cy + 4, 3, 5);
      ctx.fillRect(cx + 1,  cy + 4, 3, 5);
      ctx.fillRect(cx + 7,  cy + 6, 3, 4);
    }
  }

  // ── Draw UFO ──────────────────────────────────────────────────────────────
  function drawUfo() {
    const x  = ufo.x;
    const cy = UFO_Y + UFO_H / 2;
    // Body
    setGlow(C.red, 16);
    ctx.fillStyle = C.red;
    ctx.beginPath();
    ctx.ellipse(x, cy + 2, UFO_W / 2, UFO_H / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Dome
    setGlow(C.yellow, 10);
    ctx.fillStyle = C.yellow;
    ctx.beginPath();
    ctx.ellipse(x, cy - 1, UFO_W / 4, UFO_H / 2 - 1, 0, Math.PI, 0);
    ctx.fill();
    // Lights
    ctx.fillStyle = C.yellow;
    setGlow(C.yellow, 6);
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.arc(x + i * 8, cy + 5, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    clearGlow();
    // "?" label
    ctx.font = '6px "Press Start 2P"';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    setGlow(C.yellow, 8);
    ctx.fillStyle = C.yellow;
    ctx.fillText('?', x, cy - UFO_H / 2 - 5);
    ctx.textAlign    = 'left';
    ctx.textBaseline = 'middle';
    clearGlow();
  }

  // ── Draw player cannon ────────────────────────────────────────────────────
  function drawPlayer() {
    const x = playerX, y = PLAYER_Y;
    setGlow(C.green, 16);
    ctx.fillStyle = C.green;
    ctx.fillRect(x - PLAYER_W / 2, y + 8, PLAYER_W, 8);    // base
    ctx.fillRect(x - 10,           y + 3, 20, 8);            // mid-body
    ctx.fillRect(x - 3,            y,      6, 8);             // barrel
    clearGlow();
  }

  // Small cannon icon for lives display
  function drawCannonIcon(ix, iy, sz) {
    ctx.fillRect(ix,          iy + sz * 0.5, sz,       sz * 0.35);
    ctx.fillRect(ix + sz * 0.2, iy + sz * 0.2, sz * 0.6, sz * 0.35);
    ctx.fillRect(ix + sz * 0.4, iy,            sz * 0.2, sz * 0.35);
  }

  // ── Draw bullets ─────────────────────────────────────────────────────────
  function drawBullets() {
    // Player bullet — bright yellow laser
    if (playerBullet) {
      setGlow(C.yellow, 12);
      ctx.fillStyle = C.yellow;
      ctx.fillRect(playerBullet.x - 1, playerBullet.y - 7, 3, 14);
      clearGlow();
    }
    // Alien bullets — red zigzag
    setGlow(C.red, 8);
    ctx.fillStyle = C.red;
    for (const b of alienBullets) {
      const z = Math.floor(b.y / 5) % 2;
      const ox = z ? 2 : -2;
      ctx.fillRect(b.x + ox - 1, b.y - 5, 2, 5);
      ctx.fillRect(b.x - ox - 1, b.y,     2, 5);
    }
    clearGlow();
  }

  // ── Draw shields ──────────────────────────────────────────────────────────
  function drawShields() {
    setGlow(C.green, 6);
    ctx.fillStyle = C.green;
    for (const s of shields) {
      for (let r = 0; r < SH_PROWS; r++) {
        for (let c = 0; c < SH_PCOLS; c++) {
          if (s.grid[r * SH_PCOLS + c]) {
            ctx.fillRect(s.x + c * SH_PIX, s.y + r * SH_PIX, SH_PIX - 1, SH_PIX - 1);
          }
        }
      }
    }
    clearGlow();
  }

  // ── Draw explosions ───────────────────────────────────────────────────────
  function drawExplosions() {
    for (const e of explosions) {
      const maxT  = e.label ? 700 : 500;
      const alpha = Math.max(0, e.t / maxT);
      ctx.globalAlpha = alpha;
      setGlow(e.color, 18);
      ctx.fillStyle = e.color;
      const { x, y } = e;
      ctx.fillRect(x - 14, y - 2, 8,  4);
      ctx.fillRect(x + 6,  y - 2, 8,  4);
      ctx.fillRect(x - 2,  y - 14, 4, 8);
      ctx.fillRect(x - 2,  y + 6,  4, 8);
      ctx.fillRect(x - 9,  y - 9,  5, 5);
      ctx.fillRect(x + 4,  y - 9,  5, 5);
      ctx.fillRect(x - 9,  y + 4,  5, 5);
      ctx.fillRect(x + 4,  y + 4,  5, 5);
      if (e.label) {
        ctx.font = '7px "Press Start 2P"';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle    = C.yellow;
        setGlow(C.yellow, 10);
        ctx.fillText(String(e.label), x, y - 22);
        ctx.textAlign    = 'left';
      }
      clearGlow();
    }
    ctx.globalAlpha = 1;
  }

  // ── Lives / level strip ───────────────────────────────────────────────────
  function drawLivesStrip() {
    const stripY = H - 44;
    // Thin separator line
    ctx.strokeStyle = C.dim;
    ctx.lineWidth   = 1;
    ctx.beginPath(); ctx.moveTo(0, stripY); ctx.lineTo(W, stripY); ctx.stroke();

    setGlow(C.green, 8);
    ctx.fillStyle = C.green;
    for (let i = 0; i < lives; i++) {
      drawCannonIcon(8 + i * 24, stripY + 8, 18);
    }
    clearGlow();

    // Level label right side
    ctx.font = '6px "Press Start 2P"';
    ctx.textBaseline = 'middle';
    setGlow(C.purple, 8);
    ctx.fillStyle = C.purple;
    ctx.fillText('LV ' + String(wave).padStart(2, '0'), W - 52, stripY + 18);
    clearGlow();
  }

  // ── Glow helpers ──────────────────────────────────────────────────────────
  function setGlow(color, blur) {
    ctx.shadowColor = color;
    ctx.shadowBlur  = blur;
  }
  function clearGlow() {
    ctx.shadowBlur = 0;
  }

  // ── Keyboard input ────────────────────────────────────────────────────────
  const keys = { left: false, right: false, shootPressed: false };

  document.addEventListener('keydown', e => {
    if (e.code === 'ArrowLeft'  || e.code === 'KeyA') keys.left  = true;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
    if (e.code === 'Space') {
      e.preventDefault();
      if (running) keys.shootPressed = true;
    }
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  });
  document.addEventListener('keyup', e => {
    if (e.code === 'ArrowLeft'  || e.code === 'KeyA') keys.left  = false;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
  });

  // ── Touch input ───────────────────────────────────────────────────────────
  // Left half of screen = move left, right half = move right
  // Top 30% = shoot
  const touchZones = {};  // id -> 'left'|'right'|'shoot'

  function touchZone(t) {
    const rect = canvas.getBoundingClientRect();
    const tx   = (t.clientX - rect.left) * (W / rect.width);
    const ty   = (t.clientY - rect.top)  * (H / rect.height);
    if (ty < H * 0.30) return 'shoot';
    return tx < W / 2 ? 'left' : 'right';
  }

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      const zone = touchZone(t);
      touchZones[t.identifier] = zone;
      if (zone === 'left')  keys.left  = true;
      if (zone === 'right') keys.right = true;
      if (zone === 'shoot' && running) keys.shootPressed = true;
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      const zone = touchZones[t.identifier];
      if (zone === 'left')  keys.left  = false;
      if (zone === 'right') keys.right = false;
      delete touchZones[t.identifier];
    }
  }, { passive: false });

  canvas.addEventListener('touchcancel', e => {
    keys.left = keys.right = false;
    for (const k in touchZones) delete touchZones[k];
  }, { passive: false });

  // ── Overlay ───────────────────────────────────────────────────────────────
  function showOverlay(title, msg, btn) {
    document.getElementById('overlay-title').textContent = title;
    document.getElementById('overlay-msg').innerHTML    = msg;
    document.getElementById('start-btn').textContent    = btn;
    document.getElementById('overlay').style.display   = 'flex';
  }
  function hideOverlay() {
    document.getElementById('overlay').style.display = 'none';
  }

  document.getElementById('start-btn').addEventListener('click', startGame);

  // ── Title screen static render ────────────────────────────────────────────
  (function titleRender() {
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, W, H);

    // Stars
    for (const s of STARS) {
      ctx.globalAlpha = s.br;
      ctx.fillStyle   = '#ffffff';
      ctx.fillRect(s.x, s.y, 1, 1);
    }
    ctx.globalAlpha = 1;

    // Show example aliens
    const cols  = [80, 160, 240, 320, 400];

    // Row 0 — cyan UFO type
    setGlow(C.cyan, 10); ctx.fillStyle = C.cyan;
    for (const cx of cols) drawUfoAlien(cx, 175, 0);

    // Rows 1-2 — purple crab type
    setGlow(C.purple, 10); ctx.fillStyle = C.purple;
    for (const cx of cols) drawCrabAlien(cx, 230, 0);
    for (const cx of cols) drawCrabAlien(cx, 265, 1);

    // Rows 3-4 — green squid type
    setGlow(C.green, 10); ctx.fillStyle = C.green;
    for (const cx of cols) drawSquidAlien(cx, 320, 0);
    for (const cx of cols) drawSquidAlien(cx, 355, 1);

    clearGlow();

    // Score table
    ctx.font = '6px "Press Start 2P"';
    ctx.textBaseline = 'middle';
    const rows = [
      { label: '= ? =  MYSTERY', pts: '???', color: C.red    },
      { label: 'UFO-TYPE',       pts: ' 10', color: C.cyan   },
      { label: 'CRAB-TYPE',      pts: ' 20', color: C.purple },
      { label: 'SQUID-TYPE',     pts: ' 30', color: C.green  },
    ];
    rows.forEach((row, i) => {
      setGlow(row.color, 8);
      ctx.fillStyle = row.color;
      ctx.fillText(row.label + '  =  ' + row.pts + ' PTS', 80, 405 + i * 22);
    });
    clearGlow();
  })();

})();
</script>
</body>
